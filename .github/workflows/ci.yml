name: PR Auto-merge

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Run tests
        uses: takumi3488/mygha/bun/test@main
        with:
          skip-test: true

